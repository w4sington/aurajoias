<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de produtos | Aura Joias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #d4af37; --dark-color: #1a1a1a; }
        body { background-color: #fdfdfd; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--dark-color); border-bottom: 3px solid var(--primary-color); }
        .product-card { transition: all 0.3s; border: 1px solid #eee; border-radius: 10px; overflow: hidden; height: 100%; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-img { height: 280px; object-fit: cover; }
        .whatsapp-btn { background-color: #25d366; color: white; font-weight: bold; border: none; }
        .whatsapp-btn:hover { background-color: #1eb954; color: white; }
        .btn-check:checked + .btn-outline-gold { background-color: var(--primary-color); color: white; }
        .btn-outline-gold { border-color: var(--primary-color); color: var(--primary-color); }
        .btn-outline-gold:hover { background-color: var(--primary-color); color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4 text-center">
        <div class="container justify-content-center">
            <a class="navbar-brand" href="#">✨ AURA JOIAS - CATÁLOGO ✨</a>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4 justify-content-center">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control form-control-lg text-center" placeholder="O que você está procurando hoje?" onkeyup="filterContent()">
            </div>
        </div>

        <div class="row mb-5 text-center">
            <div class="col-12">
                <div class="btn-group flex-wrap" role="group">
                    <input type="radio" class="btn-check" name="cat" id="all" checked onchange="filterContent()">
                    <label class="btn btn-outline-gold px-4" for="all">Todos</label>

                    <input type="radio" class="btn-check" name="cat" id="pulseira" onchange="filterContent()">
                    <label class="btn btn-outline-gold px-4" for="pulseira">Pulseiras</label>

                    <input type="radio" class="btn-check" name="cat" id="brinco" onchange="filterContent()">
                    <label class="btn btn-outline-gold px-4" for="brinco">Brincos</label>

                    <input type="radio" class="btn-check" name="cat" id="colar" onchange="filterContent()">
                    <label class="btn btn-outline-gold px-4" for="colar">Colares</label>

                    <input type="radio" class="btn-check" name="cat" id="anel" onchange="filterContent()">
                    <label class="btn btn-outline-gold px-4" for="anel">Anéis/Alianças</label>
                </div>
            </div>
        </div>
        
        <div class="row g-4" id="productGrid">
            </div>

        <div id="noResults" class="text-center mt-5 d-none">
            <h4>Nenhum item encontrado. 💎</h4>
        </div>
    </div>

    <script>
        let produtosData = [];

        // Busca os produtos do arquivo JSON
        async function fetchProdutos() {
            try {
                const response = await fetch('produtos.json');
                produtosData = await response.json();
                renderizarProdutos(produtosData);
            } catch (error) {
                console.error("Erro ao carregar produtos:", error);
                document.getElementById('productGrid').innerHTML = "<p class='text-center'>Erro ao carregar o catálogo. Verifique o arquivo JSON.</p>";
            }
        }

        // Desenha os cards no HTML
        function renderizarProdutos(lista) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";

            lista.forEach(prod => {
                const html = `
                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="card product-card">
                            <img src="${prod.imagem}" class="card-img-top product-img" alt="${prod.nome}">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${prod.nome}</h5>
                                <p class="card-text text-muted small">${prod.descricao}</p>
                                <h4 class="text-dark mt-auto">R$ ${prod.preco}</h4>
                                <a href="https://wa.me/5533936180076?text=Olá! Vi o produto *${prod.nome}* no catálogo e gostaria de mais informações." 
                                   class="btn whatsapp-btn w-100 mt-2" target="_blank">Pedir agora</a>
                            </div>
                        </div>
                    </div>`;
                grid.innerHTML += html;
            });

            document.getElementById('noResults').classList.toggle('d-none', lista.length > 0);
        }

        // Filtra por texto e categoria simultaneamente
        function filterContent() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const selectedCategory = document.querySelector('input[name="cat"]:checked').id;

            const filtrados = produtosData.filter(p => {
                const matchesText = p.nome.toLowerCase().includes(searchText) || p.descricao.toLowerCase().includes(searchText);
                const matchesCategory = (selectedCategory === 'all' || p.categoria === selectedCategory);
                return matchesText && matchesCategory;
            });

            renderizarProdutos(filtrados);
        }

        // Inicia o processo
        fetchProdutos();
    </script>
</body>
</html>
